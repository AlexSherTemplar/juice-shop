name: fuzzing

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:

  setup-target:
    runs-on: ubuntu-latest
    outputs:
      base_url: ${{ steps.set.outputs.base_url }}

    steps:
      - name: Start Juice Shop
        run: |
          docker run -d -p 3000:3000 --name juice bkimminich/juice-shop
          sleep 20

      - name: Set base URL
        id: set
        run: echo "base_url=http://localhost:3000" >> $GITHUB_OUTPUT

  ffuf:
    needs: setup-target
    runs-on: ubuntu-latest

    steps:
      - name: Install ffuf
        run: |
          go install github.com/ffuf/ffuf/v2@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Run ffuf fuzzing
        run: |
          mkdir -p artifacts/ffuf

          ffuf -u "${{ needs.setup-target.outputs.base_url }}/FUZZ" \
               -w /usr/share/wordlists/dirb/common.txt \
               -mc 200,204,301,302,307,401,403 \
               -of json \
               -o artifacts/ffuf/results.json

      - name: Upload ffuf artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffuf-results
          path: artifacts/ffuf

  zap:
    needs: setup-target
    runs-on: ubuntu-latest

    steps:
      - name: Run ZAP baseline scan
        run: |
          mkdir -p artifacts/zap

          docker run --rm \
            -v $(pwd)/artifacts/zap:/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t ${{ needs.setup-target.outputs.base_url }} \
            -r report.html \
            -J report.json

      - name: Upload ZAP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zap-results
          path: artifacts/zap

  boofuzz:
    needs: setup-target
    runs-on: ubuntu-latest

    steps:
      - name: Install boofuzz
        run: pip install boofuzz requests

      - name: Run boofuzz script
        run: |
          mkdir -p artifacts/boofuzz

          cat << 'EOF' > fuzz.py
          from boofuzz import *
          import requests

          def main():
              session = Session(
                  target=Target(
                      connection=TCPSocketConnection("localhost", 3000)
                  )
              )
          
              s_initialize("login")
          
              s_string("POST /rest/user/login HTTP/1.1\r\n")
              s_string("Host: localhost\r\n")
              s_string("Content-Type: application/json\r\n\r\n")
          
              s_string('{"email":"admin@juice-sh.op","password":"')
              s_string("FUZZ", fuzzable=True)
              s_string('"}')
          
              session.connect(s_get("login"))
              session.fuzz()
          
          if __name__ == "__main__":
              main()
          EOF

          python fuzz.py || true

      - name: Collect boofuzz logs
        run: |
          mv boofuzz-results/* artifacts/boofuzz/ || true

      - name: Upload boofuzz artifacts
        uses: actions/upload-artifact@v4
        with:
          name: boofuzz-results
          path: artifacts/boofuzz

  aggregate:
    needs: [ffuf, zap, boofuzz]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Merge reports
        run: |
          mkdir final-report

          cp -r ffuf-results final-report/
          cp -r zap-results final-report/
          cp -r boofuzz-results final-report/

      - name: Upload final report
        uses: actions/upload-artifact@v4
        with:
          name: full-fuzz-report
          path: final-report
